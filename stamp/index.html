<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタンプ使用ランキング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --surface-2: #EFEFEC;
    --accent: #5B4EE8;
    --accent-dim: rgba(91,78,232,0.08);
    --accent-glow: rgba(91,78,232,0.18);
    --orange: #D4620A;
    --text: #1A1A18;
    --text-sub: rgba(26,26,24,0.6);
    --text-muted: rgba(26,26,24,0.38);
    --border: rgba(26,26,24,0.1);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 2.5rem 1.5rem 4rem;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .header-title {
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .header-title span {
    color: var(--accent);
  }

  .date-badge {
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.85rem;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .date-badge strong {
    color: var(--text-sub);
    font-weight: 500;
  }

  /* ランキングリスト */
  .rank-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .rank-item {
    display: grid;
    grid-template-columns: 2rem 1fr auto;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 0.9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color 0.15s;
    position: relative;
    overflow: hidden;
  }

  .rank-item:hover {
    border-color: rgba(91,78,232,0.3);
  }

  /* 棒グラフ背景 */
  .rank-bar-bg {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--accent-dim);
    border-radius: 10px 0 0 10px;
    width: var(--bar-w, 0%);
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
  }

  .rank-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    text-align: right;
    position: relative;
    z-index: 1;
  }

  .rank-num.top3 {
    color: var(--accent);
  }

  .rank-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    word-break: break-all;
    position: relative;
    z-index: 1;
  }

  .rank-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-sub);
    white-space: nowrap;
    text-align: right;
    position: relative;
    z-index: 1;
  }

  /* 読み込み */
  .loading {
    text-align: center;
    padding: 4rem 0;
    color: var(--text-muted);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }

  .loading-dot {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  .error-msg {
    text-align: center;
    padding: 2rem;
    color: #F7786A;
    font-size: 0.85rem;
    background: rgba(247,120,106,0.07);
    border: 1px solid rgba(247,120,106,0.2);
    border-radius: 10px;
  }

  .total-info {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: right;
    margin-bottom: 1rem;
    letter-spacing: 0.02em;
  }
  .total-info strong { color: var(--text-sub); }
</style>
</head>
<body>

<header>
  <h1 class="header-title">スタンプ<span>使用</span>ランキング</h1>
  <div class="date-badge" id="dateBadge">読み込み中…</div>
</header>

<div id="content">
  <div class="loading">
    <span class="loading-dot">●</span>
    <span class="loading-dot">●</span>
    <span class="loading-dot">●</span>
  </div>
</div>

<script>
const API = 'https://YOUR_WORKER.workers.dev'; // ← Worker の URL に変更

async function post(action, params = {}) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, params }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function fmt(n) {
  return Number(n).toLocaleString('ja-JP');
}

async function init() {
  try {
    const [dateRes, stampsRes] = await Promise.all([
      post('get_latest_date'),
      post('get_stamp_counts'),
    ]);

    // 日付バッジ
    const badge = document.getElementById('dateBadge');
    if (dateRes?.latest_date) {
      badge.innerHTML = `<strong>${dateRes.latest_date}</strong> 時点のデータ`;
    } else {
      badge.textContent = '日付不明';
    }

    const stamps = Array.isArray(stampsRes) ? stampsRes.slice(0, 50) : [];
    if (stamps.length === 0) {
      document.getElementById('content').innerHTML =
        '<div class="error-msg">データがありません</div>';
      return;
    }

    const max = stamps[0].count;
    const total = stamps.reduce((s, r) => s + r.count, 0);

    let html = '';

    // 合計
    html += `<div class="total-info">上位 <strong>${stamps.length}</strong> 件表示 ／ 計 <strong>${fmt(total)}</strong> 回</div>`;

    // ランキングリスト
    html += '<div class="rank-list">';
    stamps.forEach((s, i) => {
      const pct = Math.round((s.count / max) * 100);
      const numClass = i < 3 ? 'rank-num top3' : 'rank-num';
      html += `
        <div class="rank-item" style="--bar-w:0%;" data-pct="${pct}">
          <div class="rank-bar-bg"></div>
          <span class="${numClass}">${i + 1}</span>
          <span class="rank-tag">${s.tag_name}</span>
          <span class="rank-count">${fmt(s.count)}</span>
        </div>
      `;
    });
    html += '</div>';

    document.getElementById('content').innerHTML = html;

    // バーアニメーション（少し遅延）
    requestAnimationFrame(() => {
      document.querySelectorAll('.rank-item[data-pct]').forEach(el => {
        const pct = el.dataset.pct;
        setTimeout(() => {
          el.style.setProperty('--bar-w', pct + '%');
        }, 80);
      });
    });

  } catch (e) {
    document.getElementById('dateBadge').textContent = 'エラー';
    document.getElementById('content').innerHTML =
      `<div class="error-msg">データの取得に失敗しました：${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
